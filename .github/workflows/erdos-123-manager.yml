name: Erdos 123 Campaign Manager

on:
  workflow_dispatch: {}
  schedule:
    - cron: "*/5 * * * *"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/erdos-123-manager.yml"
      - "run_erdos_123_live_research.sh"
      - "examples/erdos_combinatorics_charter.json"
      - "examples/conjectures/erdos/**"
      - "src/research_orchestrator/**"
      - "pyproject.toml"

permissions:
  contents: write

concurrency:
  group: erdos-123-campaign-manager
  cancel-in-progress: true

jobs:
  manager-tick:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      STATE_BRANCH: campaign-state-erdos-123
      STATE_DIR: outputs/erdos_123_live_async
      MAX_ACTIVE: "3"
      MAX_SUBMIT_PER_TICK: "2"
      TICKS_PER_RUN: "4"
      TICK_SLEEP_SECONDS: "60"
      LLM_MANAGER: "auto"
      ARISTOTLE_BIN_DIR: ${{ github.workspace }}/.venv_erdos/bin
    steps:
      - name: Check out main branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create virtualenv and install repo
        run: |
          python -m venv .venv_erdos
          ./.venv_erdos/bin/python -m pip install --upgrade pip
          ./.venv_erdos/bin/python -m pip install --no-build-isolation -e .
          ./.venv_erdos/bin/python -m pip install aristotlelib

      - name: Restore campaign state branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          STATE_CLONE="$(mktemp -d)"
          echo "STATE_CLONE=$STATE_CLONE" >> "$GITHUB_ENV"

          if git clone --depth 1 --branch "${STATE_BRANCH}" "${REPO_URL}" "${STATE_CLONE}" >/dev/null 2>&1; then
            echo "Restored existing ${STATE_BRANCH} branch."
          else
            git clone --depth 1 "${REPO_URL}" "${STATE_CLONE}"
            (
              cd "${STATE_CLONE}"
              git switch --orphan "${STATE_BRANCH}"
              git rm -rf . >/dev/null 2>&1 || true
              mkdir -p "${STATE_DIR}"
              printf '# Erdos 123 Campaign State\n\nThis branch stores generated SQLite/report artifacts for the scheduled Erdos Problem 123 research manager.\n' > README.md
              git add README.md "${STATE_DIR}"
              git -c user.name="github-actions[bot]" -c user.email="41898282+github-actions[bot]@users.noreply.github.com" commit -m "Initialize Erdos 123 campaign state branch"
              git push origin "${STATE_BRANCH}"
            )
          fi

          mkdir -p "${STATE_DIR}"
          if [ -d "${STATE_CLONE}/${STATE_DIR}" ]; then
            rsync -a "${STATE_CLONE}/${STATE_DIR}/" "${STATE_DIR}/"
          fi

      - name: Run manager tick
        env:
          ARISTOTLE_API_KEY: ${{ secrets.ARISTOTLE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          WALL_START="$(date +%s)"
          MAX_WALL_SECONDS=2100
          if [ -z "${ARISTOTLE_API_KEY:-}" ]; then
            echo "ARISTOTLE_API_KEY secret is not configured." >&2
            exit 1
          fi

          persist_state() {
            STATE_CLONE="${STATE_CLONE:?missing state clone}"
            mkdir -p "${STATE_CLONE}/${STATE_DIR}"
            rsync -a --delete "${STATE_DIR}/" "${STATE_CLONE}/${STATE_DIR}/"
            (
              cd "${STATE_CLONE}"
              git add "${STATE_DIR}" README.md
              if git diff --cached --quiet; then
                echo "No campaign-state changes to commit."
              else
                git -c user.name="github-actions[bot]" -c user.email="41898282+github-actions[bot]@users.noreply.github.com" commit -m "Update Erdos 123 campaign state"
                git push origin "${STATE_BRANCH}"
              fi
            )
          }

          for tick in $(seq 1 "${TICKS_PER_RUN}"); do
            ELAPSED="$(( $(date +%s) - WALL_START ))"
            if [ "${ELAPSED}" -gt "${MAX_WALL_SECONDS}" ]; then
              echo "Wall clock limit reached after ${ELAPSED}s, stopping early."
              break
            fi
            echo "=== erdos-123 manager tick ${tick}/${TICKS_PER_RUN} ==="
            ./run_erdos_123_live_research.sh
            persist_state

            if [ "${tick}" -lt "${TICKS_PER_RUN}" ]; then
              echo "Sleeping ${TICK_SLEEP_SECONDS}s before next tick..."
              sleep "${TICK_SLEEP_SECONDS}"
            fi
          done

      - name: Persist updated campaign state
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          STATE_CLONE="${STATE_CLONE:?missing state clone}"
          mkdir -p "${STATE_CLONE}/${STATE_DIR}"
          rsync -a --delete "${STATE_DIR}/" "${STATE_CLONE}/${STATE_DIR}/"

          (
            cd "${STATE_CLONE}"
            git add "${STATE_DIR}" README.md
            if git diff --cached --quiet; then
              echo "No campaign-state changes to commit."
            else
              git -c user.name="github-actions[bot]" -c user.email="41898282+github-actions[bot]@users.noreply.github.com" commit -m "Update Erdos 123 campaign state"
              git push origin "${STATE_BRANCH}"
            fi
          )

      - name: Upload latest report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: erdos-123-campaign-state
          path: |
            outputs/erdos_123_live_async/report.md
            outputs/erdos_123_live_async/report.manager_snapshot.json
            outputs/erdos_123_live_async/state.sqlite
          if-no-files-found: warn

      - name: Append report to workflow summary
        if: always()
        run: |
          if [ -f outputs/erdos_123_live_async/report.md ]; then
            {
              echo "## Erdos 123 campaign report"
              echo
              sed -n '1,200p' outputs/erdos_123_live_async/report.md
            } >> "$GITHUB_STEP_SUMMARY"
          fi
